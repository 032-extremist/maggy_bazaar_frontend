    <script>
        const dropdownMenu = document.getElementById('dropdownMenu');
        const menuBackdrop = document.getElementById('menuBackdrop');
        const hamburgerIcon = document.getElementById('hamburgerIcon');

        function showMenu() {
            dropdownMenu.classList.add('open');
            menuBackdrop.classList.add('active');
        }

        function hideMenu() {
            dropdownMenu.classList.remove('open');
            menuBackdrop.classList.remove('active');
        }

        menuBackdrop.addEventListener('click', hideMenu);
    </script>















    <section class="contact-store-section">
        <div class="contact-container">
            <div class="contact-form" id="inbox-container">
                <h2>My Inbox</h2>
                <div id="inboxStatus"></div>
                <div id="inboxMessages"></div>
            </div>

            <div class="store-info">
                <h2>Need Help?</h2>
                <p>Check important updates, order notifications, and messages from Maggy Bazaar.</p>
                <h3>Contact Information</h3>
                <p>Phone: +254 123 456 789</p>
                <p>Email: info@maggybazaar.com</p>
            </div>
        </div>
    </section>


    <script>
        const userEmail = sessionStorage.getItem('userEmail');
        const inboxStatus = document.getElementById('inboxStatus');
        const inboxMessages = document.getElementById('inboxMessages');

        function renderInbox(messages) {
            if (!messages.length) {
                inboxStatus.innerHTML = '<p>Your inbox is empty.</p>';
                inboxMessages.innerHTML = '';
                return;
            }

            inboxStatus.textContent = '';
            inboxMessages.innerHTML = messages.map(message => `
                <div class="message-card" style="padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 12px;">
                    <h3>${message.subject}</h3>
                    <p>${message.body}</p>
                    <div style="font-size:0.9rem; color:#555; margin-top:0.5rem;">${new Date(message.createdAt).toLocaleString()}</div>
                </div>
            `).join('');
        }

        async function loadInbox() {
            if (!userEmail) {
                inboxStatus.innerHTML = '<p>Please <a href="login.html">login</a> to view your messages.</p>';
                return;
            }

            try {
                const response = await fetch(window.apiPath(`/api/inbox/${encodeURIComponent(userEmail)}`));
                const data = await response.json();
                if (!response.ok) {
                    inboxStatus.textContent = data.error || 'Unable to load inbox.';
                    return;
                }
                renderInbox(data);
            } catch (error) {
                inboxStatus.textContent = 'Unable to load inbox. Please try again later.';
                console.error(error);
            }
        }

        loadInbox();
    </script>
