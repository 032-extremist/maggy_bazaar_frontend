    <script>
        const dropdownMenu = document.getElementById('dropdownMenu');
        const menuBackdrop = document.getElementById('menuBackdrop');
        const hamburgerIcon = document.getElementById('hamburgerIcon');

        function showMenu() {
            dropdownMenu.classList.add('open');
            menuBackdrop.classList.add('active');
        }

        function hideMenu() {
            dropdownMenu.classList.remove('open');
            menuBackdrop.classList.remove('active');
        }

        menuBackdrop.addEventListener('click', hideMenu);
    </script>















    <section class="contact-store-section">
        <div class="contact-container">
            <div class="contact-form" id="wishlist-container">
                <h2>My Wishlist</h2>
                <div id="wishlistStatus"></div>
                <div id="wishlistItems"></div>
            </div>

            <div class="store-info">
                <h2>Need Help?</h2>
                <p>Save products for later and come back when you're ready to buy.</p>
                <h3>Contact Information</h3>
                <p>Phone: +254 123 456 789</p>
                <p>Email: info@maggybazaar.com</p>
            </div>
        </div>
    </section>


    <style>
        @media (max-width: 680px) {
            .wishlist-item-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .wishlist-item-card > div:first-child {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .wishlist-item-card img {
                width: 100%;
                height: 180px;
            }

            .wishlist-item-card button {
                width: 100%;
            }
        }
    </style>

    <script>
        const userEmail = sessionStorage.getItem('userEmail');
        const wishlistStatus = document.getElementById('wishlistStatus');
        const wishlistItems = document.getElementById('wishlistItems');

        function showProductDetail(productId) {
            window.location.href = `product-detail.html?id=${productId}`;
        }


        function removeFromWishlist(productId) {
    if (!userEmail) {
        alert('Please login to manage your wishlist.');
        return;
    }

    fetch(window.apiPath('/api/wishlist/remove'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, productId: productId })
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            loadWishlist();
        } else {
            alert(data.error || 'Failed to remove item from wishlist.');
        }
    })
    .catch(error => {
        console.error('Error removing item from wishlist:', error);
        alert('An error occurred. Please try again later.');
    });
}

function addToCart(productId) {
    if (!userEmail) {
        alert('Please login to add items to your cart.');
        return;
    }

    fetch(window.apiPath('/api/cart/add'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, productId: productId, quantity: 1 })
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            alert('Item added to cart successfully!');
        } else {
            alert(data.error || 'Failed to add item to cart.');
        }
    })
    .catch(error => {
        console.error('Error adding item to cart:', error);
        alert('An error occurred. Please try again later.');
    });
}

        function renderWishlist(product) {
            if (!product.length) {
                wishlistStatus.innerHTML = '<p>Your wishlist is empty.</p>';
                wishlistItems.innerHTML = '';
                return;
            }

            wishlistStatus.textContent = '';
            wishlistItems.innerHTML = product.map(product => `
            <div class="product-card wishlist-item-card" style="padding: 1rem; margin-bottom: 1rem; display:flex; gap:1rem; align-items:center;">
                <div style="display:flex; gap:1rem; align-items:center; flex:1; min-width:0;">   
                    <img src="${product.image}" alt="${product.name}" style="width:120px; height:120px; object-fit:cover; border-radius:12px; flex-shrink:0;">
                    <div style="min-width:0;">
                        <h3>${product.name}</h3>
                        <p>${product.brand}</p>
                        <p>KES ${product.price.toLocaleString()}</p>
                        <p>${product.description}</p>
                    </div>
                </div>
                  
                     <div style="display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap;">
                           <button class="wishlist-btn" style="flex: 1; min-width: 120px; height: fit-content;" onclick="showProductDetail(${product.id})">View Product</button>
                           <button class="wishlist-btn" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center;" onclick="removeFromWishlist(${product.id})">Remove</button>
                           <button class="wishlist-btn" style="padding: 0.5rem; display: flex; align-items: center; justify-content: center;" onclick="addToCart(${product.id})"><img src="icons/cart3.png" alt="Add to Cart" style="width: 20px; height: 20px;"></button>
                       </div>

                </div>
            </div>
            `).join('');
        }

        async function loadWishlist() {
            if (!userEmail) {
                wishlistStatus.innerHTML = '<p>Please <a href="login.html">login</a> to view your wishlist.</p>';
                return;
            }

            try {
                const response = await fetch(window.apiPath(`/api/wishlist/${encodeURIComponent(userEmail)}`));
                const data = await response.json();
                if (!response.ok) {
                    wishlistStatus.textContent = data.error || 'Unable to load wishlist.';
                    return;
                }
                renderWishlist(data);
            } catch (error) {
                wishlistStatus.textContent = 'Unable to load wishlist. Please try again later.';
                console.error(error);
            }
        }

        loadWishlist();
    </script>
