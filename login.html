<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="config.js"></script>
    <script src="header.js" defer></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #02F5A1, #07191E);
}

.brand {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
}

.brand-logo {
    background: #02F5A1;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.2rem;
    color: #07191E;
}

.brand-name {
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #02F5A1, #07191E);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;

}

.header {
    text-align: center;
    margin-bottom: 30px;
}


.login-container {
    width: 500px;
    padding: 40px;
    border: 1px solid #000;
    border-radius: 15px;
    background: #fff;
}

.input-group {
    margin-bottom: 25px;
}

label {
    display: block;
    font-size: 18px;
    margin-bottom: 10px;
}

input {
    width: 100%;
    height: 40px;
    padding: 10px;
    border: 2px solid #d3d3d3;
    border-radius: 8px;
    font-size: 16px;
    box-shadow:  0 1px 8px rgba(0, 0, 0, 0.15);
}

button {
    width: 100%;
    height: 55px;
    border: none;
    border-radius: 8px;
    background: #02F5A1;
    color: #07191E;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #07191E;
    color: #02F5A1;
}

p {
    margin-top: 25px;
    text-align: center;
    font-size: 18px;
}

a {
    color: #005eff;
    text-decoration: underline;
}

@media (max-width: 640px) {
    body {
        padding: 1rem;
        align-items: flex-start;
    }

    .login-container {
        width: 100%;
        padding: 1.25rem;
        border-radius: 12px;
    }

    .brand-name {
        font-size: 1.3rem;
    }

    .header h2 {
        font-size: 1.3rem;
    }

    label {
        font-size: 1rem;
    }

    input {
        height: 44px;
        font-size: 1rem;
    }

    button {
        height: 48px;
        font-size: 1rem;
    }
}
    </style>
</head>
<body>

    <div class="login-container">
        <form id="loginForm">
        <div class="brand">
                 <div class="brand-logo">M</div>
                <div class="brand-name">MAGGY BAZAAR</div>
            </div>
            <div class="header">
            <h2>Login</h2>
           </div>
           <div id="authMessage" style="margin-bottom: 20px; color: #d00; font-size: 0.95rem;"></div>
            <div class="input-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Login</button>

            <p>
                Don't have an account?
                <a href="signup.html">Sign up</a>
            </p>
        </form>
    </div>

    <script>
        const API_BASE = window.API_BASE_URL;

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);

            let response;
            try {
                response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    body: formData
                });
            } catch (err) {
                document.getElementById('authMessage').textContent = 'Unable to connect to the backend. Please start the Flask server on port 5000.';
                return;
            }

            let result = {};
            try {
                result = await response.json();
            } catch (err) {
                document.getElementById('authMessage').textContent = 'Login failed. Invalid server response.';
                return;
            }

            if (!response.ok) {
                document.getElementById('authMessage').textContent = result.error || 'Login failed.';
                return;
            }

            // Save both email and full user object (with isAdmin)
            sessionStorage.setItem('userEmail', email);
            localStorage.setItem('user', JSON.stringify(result.user));  // ← fix: result.user not data.user

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
